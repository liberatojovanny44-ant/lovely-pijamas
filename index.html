<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lovely Pijamas · Studio</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1714">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --gold: #c9a84c; --gold-dark: #8a6520; --ink: #1a1714; --warm: #f7f4ef; --warm2: #efe9de;
  --muted: #9b8f80; --white: #ffffff; --green: #27ae60; --red: #e74c3c; --blue: #3498db;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: var(--warm); color: var(--ink); padding-bottom: 100px; }

header { background: var(--ink); padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 200; }
.brand-name { font-family: Georgia, serif; font-size: 18px; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
.sync-dot { width: 10px; height: 10px; background: #444; border-radius: 50%; border: 2px solid #000; transition: 0.3s; }

.nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); display: flex; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
.nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.3); font-size: 10px; background: none; border: none; gap: 5px; }
.nav-link.active { color: var(--gold); }

.card { background: #fff; border-radius: 20px; padding: 20px; border: 1px solid var(--warm2); margin: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
.input { width: 100%; border: 1.5px solid var(--warm2); border-radius: 12px; padding: 14px; margin-bottom: 10px; background: var(--warm); font-size: 16px; outline: none; }
.btn-gold { width: 100%; background: var(--ink); color: var(--gold); border: none; border-radius: 14px; padding: 16px; font-weight: 600; text-transform: uppercase; cursor: pointer; }

.prod-card { background: #fff; border-radius: 18px; padding: 16px; border: 1px solid var(--warm2); margin: 12px 15px; }
.tallas-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
.talla-btn { background: var(--warm); border: 1.5px solid var(--warm2); border-radius: 12px; padding: 10px 5px; display: flex; flex-direction: column; align-items: center; }

#modal-factura, #modal-editar { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
.recibo, .edit-box { background: #fff; width: 100%; max-width: 350px; border-radius: 10px; padding: 25px; position: relative; }
.venta-item { padding: 8px 0; border-bottom: 1px solid var(--warm2); display: flex; justify-content: space-between; font-size: 13px; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://lovelypijamas-97662-default-rtdb.firebaseio.com/", 
    projectId: "lovelypijamas-97662"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const stockRef = ref(db, 'inventario/');
  const ventasRef = ref(db, 'ventas/');

  onValue(stockRef, (snapshot) => {
    window.productos = snapshot.val() || [];
    window.renderActual(); 
    document.querySelector('.sync-dot').style.background = '#27ae60';
  });

  onValue(ventasRef, (snapshot) => {
    window.historialVentas = snapshot.val() || [];
    if(vistaActual === 'balance') window.renderActual();
  });

  window.guardarStock = (data) => set(stockRef, data);
  window.guardarVentas = (data) => set(ventasRef, data);
</script>
</head>
<body>

<header>
  <div><div class="brand-name">Lovely</div><div style="font-size:8px; color:var(--muted); letter-spacing:3px">STUDIO</div></div>
  <div class="sync-dot"></div>
</header>

<main id="app"></main>

<div id="modal-factura"><div class="recibo" id="recibo-content"></div></div>
<div id="modal-editar"><div class="edit-box" id="edit-content"></div></div>

<nav class="nav-bottom">
  <button class="nav-link active" id="btn-stock" onclick="irA('stock')"><i class="fas fa-box"></i>Stock</button>
  <button class="nav-link" id="btn-nuevo" onclick="irA('nuevo')"><i class="fas fa-plus"></i>Nuevo</button>
  <button class="nav-link" id="btn-ventas" onclick="irA('ventas')"><i class="fas fa-history"></i>Ventas</button>
  <button class="nav-link" id="btn-balance" onclick="irA('balance')"><i class="fas fa-chart-line"></i>Balance</button>
</nav>

<script>
window.productos = [];
window.historialVentas = [];
let vistaActual = 'stock';

function irA(vista) {
  vistaActual = vista;
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.getElementById('btn-' + vista).classList.add('active');
  window.renderActual();
}

window.renderActual = function() {
  const app = document.getElementById('app');
  if(vistaActual === 'stock') renderStock(app);
  if(vistaActual === 'nuevo') renderNuevo(app);
  if(vistaActual === 'ventas') renderHistorial(app);
  if(vistaActual === 'balance') renderBalance(app);
}

function renderStock(container) {
  let html = '';
  window.productos.forEach((p, i) => {
    html += `<div class="prod-card">
      <div style="display:flex; justify-content:space-between; margin-bottom:5px">
        <span style="font-weight:700; font-family:Georgia">${p.nombre}</span>
        <span style="color:var(--gold-dark); font-weight:700">$${p.precioVenta}</span>
      </div>
      <div class="tallas-grid">
        ${['S','M','L','XL'].map(t => `<button class="talla-btn" onclick="prepararVenta(${i}, '${t}')">
          <span style="font-size:9px; color:var(--muted)">${t}</span>
          <span style="font-size:18px; font-weight:700">${p.tallas[t] || 0}</span>
        </button>`).join('')}
      </div>
      <div style="margin-top:15px; display:flex; gap:10px">
        <button onclick="abrirEditor(${i})" style="flex:1; padding:8px; border-radius:8px; border:1px solid var(--gold); background:none; color:var(--gold-dark); font-size:10px; font-weight:bold">EDITAR</button>
        <button onclick="elimProd(${i})" style="padding:8px; border:none; background:none; color:var(--red); font-size:10px">ELIMINAR</button>
      </div>
    </div>`;
  });
  container.innerHTML = html || '<p style="text-align:center; padding:50px">No hay productos.</p>';
}

window.abrirEditor = function(idx) {
  const p = window.productos[idx];
  document.getElementById('modal-editar').style.display = 'flex';
  document.getElementById('edit-content').innerHTML = `
    <h3 style="margin-bottom:15px">Editar Producto</h3>
    <input type="text" id="e-nom" class="input" value="${p.nombre}">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <label style="font-size:10px">Costo</label><label style="font-size:10px">Venta</label>
      <input type="number" id="e-costo" class="input" value="${p.costo}">
      <input type="number" id="e-venta" class="input" value="${p.precioVenta}">
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <input type="number" id="e-s" class="input" value="${p.tallas.S}" placeholder="S">
      <input type="number" id="e-m" class="input" value="${p.tallas.M}" placeholder="M">
      <input type="number" id="e-l" class="input" value="${p.tallas.L}" placeholder="L">
      <input type="number" id="e-xl" class="input" value="${p.tallas.XL}" placeholder="XL">
    </div>
    <button class="btn-gold" onclick="actualizar(${idx})">Actualizar Todo</button>
    <button onclick="document.getElementById('modal-editar').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:var(--muted)">Cerrar</button>
  `;
}

window.actualizar = function(idx) {
  window.productos[idx] = {
    nombre: document.getElementById('e-nom').value,
    costo: parseFloat(document.getElementById('e-costo').value),
    precioVenta: parseFloat(document.getElementById('e-venta').value),
    tallas: {
      S: parseInt(document.getElementById('e-s').value || 0),
      M: parseInt(document.getElementById('e-m').value || 0),
      L: parseInt(document.getElementById('e-l').value || 0),
      XL: parseInt(document.getElementById('e-xl').value || 0)
    }
  };
  window.guardarStock(window.productos);
  document.getElementById('modal-editar').style.display = 'none';
}

function prepararVenta(idx, talla) {
  if(window.productos[idx].tallas[talla] > 0) {
    const p = window.productos[idx];
    const fecha = new Date().toLocaleString();
    const venta = { nombre: p.nombre, talla: talla, precio: p.precioVenta, costo: p.costo, fecha: fecha };
    window.historialVentas.push(venta);
    window.productos[idx].tallas[talla]--;
    window.guardarStock(window.productos);
    window.guardarVentas(window.historialVentas);
    mostrarFactura(venta);
  }
}

function mostrarFactura(v) {
  document.getElementById('modal-factura').style.display = 'flex';
  document.getElementById('recibo-content').innerHTML = `
    <div style="text-align:center; border-bottom:1px dashed #ccc; padding-bottom:10px">
      <h2 style="font-family:Georgia">LOVELY</h2><p style="font-size:10px">Pijamas Studio</p>
    </div>
    <div style="margin:15px 0">1x ${v.nombre} [${v.talla}] - $${v.precio}</div>
    <button onclick="enviarWA('${v.nombre}', '${v.talla}', '${v.precio}')" style="width:100%; padding:12px; background:#25d366; color:#fff; border:none; border-radius:8px; font-weight:700">WHATSAPP</button>
    <button onclick="document.getElementById('modal-factura').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:var(--muted)">Cerrar</button>`;
}

window.enviarWA = (n, t, p) => {
  const msg = `*Lovely Pijamas Studio*%0A¡Hola! Recibo de compra:%0A*Producto:* ${n}%0A*Talla:* ${t}%0A*Total:* $${p}%0A✨ ¡Gracias!`;
  window.open(`https://wa.me/?text=${msg}`, '_blank');
}

function renderNuevo(container) {
  container.innerHTML = `<div class="card">
    <h3>Nueva Pijama</h3>
    <input type="text" id="n-nom" class="input" placeholder="Nombre">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <input type="number" id="n-costo" class="input" placeholder="Costo $">
      <input type="number" id="n-venta" class="input" placeholder="Venta $">
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <input type="number" id="n-s" class="input" placeholder="S">
      <input type="number" id="n-m" class="input" placeholder="M">
      <input type="number" id="n-l" class="input" placeholder="L">
      <input type="number" id="n-xl" class="input" placeholder="XL">
    </div>
    <button class="btn-gold" onclick="crear()">Guardar en Stock</button>
  </div>`;
}

window.crear = function() {
  const p = {
    nombre: document.getElementById('n-nom').value || 'Sin nombre',
    costo: parseFloat(document.getElementById('n-costo').value || 0),
    precioVenta: parseFloat(document.getElementById('n-venta').value || 0),
    tallas: { S: parseInt(document.getElementById('n-s').value || 0), M: parseInt(document.getElementById('n-m').value || 0), L: parseInt(document.getElementById('n-l').value || 0), XL: parseInt(document.getElementById('n-xl').value || 0) }
  };
  window.productos.push(p);
  window.guardarStock(window.productos);
  irA('stock');
}

function renderHistorial(container) {
  let html = '<div class="card"><h3>Historial de Ventas</h3>';
  [...window.historialVentas].reverse().forEach((v, idx) => {
    html += `<div class="venta-item">
      <div><strong>${v.nombre}</strong> (${v.talla})<br><small>${v.fecha}</small></div>
      <div style="text-align:right">$${v.precio}<br><button onclick="elimVenta(${window.historialVentas.length - 1 - idx})" style="color:var(--red); border:none; background:none; font-size:10px">Borrar</button></div>
    </div>`;
  });
  container.innerHTML = html + '</div>';
}

function renderBalance(container) {
  let inversionEnStock = 0;
  let gananciaProyectadaStock = 0;
  let gananciaRealVentas = 0;
  let totalArticulos = 0;

  // Calcular lo que hay en el inventario actual
  window.productos.forEach(p => {
    const stockTotal = Object.values(p.tallas).reduce((a, b) => a + b, 0);
    inversionEnStock += (p.costo * stockTotal);
    gananciaProyectadaStock += ((p.precioVenta - p.costo) * stockTotal);
    totalArticulos += stockTotal;
  });

  // Calcular lo que ya se ganó con ventas pasadas
  window.historialVentas.forEach(v => {
    gananciaRealVentas += (v.precio - v.costo);
  });

  container.innerHTML = `
    <div class="card">
      <h3 style="margin-bottom:15px; border-bottom:1px solid var(--warm2); padding-bottom:10px">Balance Lovely</h3>
      
      <div class="venta-item">
        <span>Artículos en Stock:</span>
        <strong>${totalArticulos} u.</strong>
      </div>

      <div class="venta-item">
        <span>Inversión Actual:</span>
        <strong style="color:var(--ink)">$${inversionEnStock}</strong>
      </div>

      <div class="venta-item" style="background:rgba(52, 152, 219, 0.05); padding:10px; border-radius:8px; margin:10px 0">
        <span style="color:var(--blue)">Ganancia por vender stock:</span>
        <strong style="color:var(--blue)">$${gananciaProyectadaStock}</strong>
      </div>

      <div class="venta-item" style="background:rgba(39, 174, 96, 0.1); padding:15px; border-radius:10px; margin-top:15px; border:none">
        <span style="font-weight:bold; color:var(--green)">Ganancia Real (Caja):</span>
        <strong style="font-size:20px; color:var(--green)">$${gananciaRealVentas}</strong>
      </div>
      
      <p style="font-size:10px; color:var(--muted); margin-top:20px; text-align:center">
        *La ganancia por vender stock es lo que recibirás al liquidar la mercancía actual.
      </p>
    </div>
  `;
}

window.elimProd = (idx) => { if(confirm("¿Eliminar producto?")) { window.productos.splice(idx,1); window.guardarStock(window.productos); } }
window.elimVenta = (idx) => { if(confirm("¿Borrar registro de venta?")) { window.historialVentas.splice(idx,1); window.guardarVentas(window.historialVentas); irA('ventas'); } }

window.onload = () => { setTimeout(() => irA('stock'), 500); };
</script>
</body>
</html>
