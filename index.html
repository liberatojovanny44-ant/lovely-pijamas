<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lovely Pijamas · Studio</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lovely">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8d5a3;
  --gold-dark: #8a6520;
  --ink: #1a1714;
  --warm: #f7f4ef;
  --warm2: #efe9de;
  --muted: #9b8f80;
  --white: #ffffff;
  --red: #c0392b;
  --green: #27ae60;
  --blue: #2980b9;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--warm);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 90px;
}

/* ── LOADING SCREEN ── */
#loading-screen {
  position: fixed; inset: 0;
  background: var(--ink);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  gap: 16px;
}
#loading-screen .brand-name {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 28px; font-weight: 600;
  color: var(--gold); letter-spacing: 4px; text-transform: uppercase;
}
#loading-screen .brand-sub {
  font-size: 9px; letter-spacing: 5px;
  color: var(--muted); text-transform: uppercase;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-top: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HEADER ── */
header {
  background: var(--ink);
  padding: 18px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 200;
}
.brand { display: flex; flex-direction: column; }
.brand-name {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  line-height: 1;
}
.brand-sub {
  font-size: 8px;
  letter-spacing: 5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 4px;
}
.header-actions { display: flex; gap: 10px; }
.btn-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: var(--gold-light);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-icon:active { background: rgba(201,168,76,0.2); transform: scale(0.94); }

/* sync indicator */
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  position: absolute; top: 6px; right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── NAV ── */
.nav-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--ink);
  display: flex;
  padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
  z-index: 200;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.nav-link {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  color: rgba(255,255,255,0.25);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border: none;
  background: none;
  cursor: pointer;
  gap: 5px;
  transition: color 0.2s;
  padding: 4px 0;
}
.nav-link i { font-size: 18px; }
.nav-link.active { color: var(--gold); }

/* ── CARDS ── */
.card {
  background: var(--white);
  border-radius: 18px;
  padding: 20px;
  border: 1px solid var(--warm2);
}
.section-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 1px;
  margin-bottom: 16px;
}

/* ── INPUTS ── */
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.input {
  width: 100%;
  border: 1.5px solid var(--warm2);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 15px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--warm);
  color: var(--ink);
  outline: none;
  transition: all 0.2s;
}
.input:focus { border-color: var(--gold); background: #fff; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.input-3 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
.talla-field { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.talla-field span { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
.talla-field .input { text-align: center; padding: 10px 4px; }

/* ── BTNS ── */
.btn-gold {
  width: 100%;
  background: var(--ink);
  color: var(--gold);
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-gold:active { transform: scale(0.97); opacity: 0.85; }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; }
.search-wrap .input { padding-left: 38px; background: #fff; }

/* ── PRODUCTO CARD ── */
.prod-card {
  background: var(--white);
  border-radius: 18px;
  padding: 16px;
  border: 1px solid var(--warm2);
  margin-bottom: 12px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.prod-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.prod-name { font-family: Georgia, 'Times New Roman', serif; font-size: 17px; font-weight: 600; color: var(--ink); line-height: 1.2; }
.prod-price { font-size: 18px; font-weight: 600; color: var(--gold-dark); margin-top: 2px; }
.prod-cost { font-size: 11px; color: var(--muted); margin-top: 1px; }
.prod-actions { display: flex; gap: 6px; }
.btn-sm {
  width: 34px; height: 34px;
  border-radius: 10px;
  border: 1.5px solid var(--warm2);
  background: var(--warm);
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-sm:active { transform: scale(0.9); }
.btn-sm.danger:active { color: var(--red); border-color: var(--red); }

.colores-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.color-tag {
  font-size: 10px; font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1.5px solid var(--warm2);
  background: var(--warm);
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.tallas-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.talla-btn {
  background: var(--warm);
  border: 1.5px solid var(--warm2);
  border-radius: 12px;
  padding: 10px 4px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
  transition: all 0.12s;
  position: relative;
}
.talla-btn:active { transform: scale(0.9); background: var(--warm2); }
.talla-btn .t-label { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.talla-btn .t-qty { font-size: 20px; font-weight: 600; color: var(--ink); line-height: 1; }
.talla-btn.zero .t-qty { color: #ddd; }
.talla-hint { text-align: center; font-size: 9px; color: var(--muted); margin-top: 8px; letter-spacing: 1px; text-transform: uppercase; }

.quick-actions { display: flex; gap: 8px; margin-bottom: 8px; }
.btn-action {
  flex: 1; padding: 8px 4px;
  border-radius: 10px;
  border: 1.5px solid var(--warm2);
  background: var(--warm);
  font-size: 10px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.15s;
}
.btn-action:active { background: var(--warm2); }
.btn-action.sell { color: var(--green); border-color: #b7e4c7; background: #f0faf4; }
.btn-action.restock { color: var(--blue); border-color: #aed6f1; background: #eaf4fb; }

/* ── BALANCE ── */
.balance-hero {
  background: var(--ink);
  border-radius: 20px;
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 14px;
}
.balance-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
.balance-amount { font-family: Georgia, 'Times New Roman', serif; font-size: 48px; font-weight: 300; color: var(--gold); line-height: 1; }
.balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; }
.balance-item p:first-child { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.25); text-transform: uppercase; margin-bottom: 4px; }
.balance-item p:last-child { font-size: 18px; font-weight: 600; }
.bal-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.bal-mini-card {
  background: var(--white);
  border-radius: 16px;
  padding: 16px;
  border: 1px solid var(--warm2);
  text-align: center;
}
.bal-mini-card .bm-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.bal-mini-card .bm-val { font-family: Georgia, 'Times New Roman', serif; font-size: 28px; font-weight: 600; color: var(--ink); }

/* ── HISTORIAL ── */
.hist-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--warm2);
}
.hist-item:last-child { border-bottom: none; }
.hist-left { display: flex; flex-direction: column; gap: 2px; }
.hist-name { font-weight: 500; font-size: 14px; color: var(--ink); }
.hist-meta { font-size: 11px; color: var(--muted); }
.hist-badge {
  font-size: 10px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.hist-badge.venta { background: #eafaf1; color: var(--green); }
.hist-badge.entrada { background: #eaf4fb; color: var(--blue); }

/* ── GRÁFICA ── */
.chart-wrap { padding: 10px 0; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.bar-label { font-size: 11px; font-weight: 500; color: var(--ink); width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; background: var(--warm2); border-radius: 6px; height: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); transition: width 0.6s ease; }
.bar-val { font-size: 11px; font-weight: 600; color: var(--gold-dark); width: 40px; text-align: right; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,23,20,0.6);
  backdrop-filter: blur(4px);
  z-index: 500;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--white);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 500px;
  padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(30px); } to { transform: translateY(0); } }
.modal-title { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 600; margin-bottom: 16px; color: var(--ink); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.btn-cancel {
  flex: 1; padding: 14px;
  border-radius: 12px;
  border: 1.5px solid var(--warm2);
  background: var(--warm);
  font-size: 13px; font-weight: 600;
  color: var(--muted); cursor: pointer;
}
.btn-confirm {
  flex: 2; padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--ink);
  color: var(--gold);
  font-size: 13px; font-weight: 600;
  letter-spacing: 1px; cursor: pointer;
}
.tallas-modal { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
.talla-modal-btn {
  border: 1.5px solid var(--warm2);
  border-radius: 12px;
  padding: 12px 4px;
  background: var(--warm);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; transition: all 0.15s;
}
.talla-modal-btn.selected { border-color: var(--gold); background: #fdf9ee; }
.talla-modal-btn .t-l { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
.talla-modal-btn .t-q { font-size: 18px; font-weight: 600; color: var(--ink); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--gold-light);
  padding: 10px 20px; border-radius: 40px;
  font-size: 13px; font-weight: 500;
  z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ── COLORES INPUT ── */
.colores-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: var(--warm); border-radius: 12px; border: 1.5px solid var(--warm2); min-height: 48px; align-items: center; cursor: text; }
.color-chip {
  background: var(--ink); color: var(--gold-light);
  font-size: 11px; font-weight: 600;
  padding: 4px 10px 4px 10px;
  border-radius: 20px; display: flex; align-items: center; gap: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.color-chip button { background: none; border: none; color: var(--gold-light); opacity: 0.5; cursor: pointer; font-size: 11px; line-height: 1; }
#color-input-field { border: none; outline: none; background: transparent; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-width: 80px; flex: 1; color: var(--ink); }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-state i { font-size: 40px; color: var(--warm2); margin-bottom: 12px; }
.empty-state p { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

/* ── FILTRO ── */
.filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 6px 14px;
  border-radius: 20px; border: 1.5px solid var(--warm2);
  background: var(--white); font-size: 11px; font-weight: 600;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
  white-space: nowrap; letter-spacing: 0.5px;
}
.filter-chip.active { background: var(--ink); color: var(--gold); border-color: var(--ink); }

/* ── RECIBO ── */
.recibo-overlay {
  position: fixed; inset: 0;
  background: rgba(26,23,20,0.7);
  backdrop-filter: blur(6px);
  z-index: 600;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.recibo-overlay.hidden { display: none; }
.recibo-box {
  background: white;
  border-radius: 20px;
  width: 100%; max-width: 360px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.recibo-header { background: var(--ink); padding: 24px 20px 20px; text-align: center; }
.recibo-brand { font-family: Georgia, serif; font-size: 26px; font-weight: 600; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
.recibo-sub { font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 4px; }
.recibo-num { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 10px; letter-spacing: 1px; }
.recibo-body { padding: 20px; }
.recibo-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px dashed var(--warm2); font-size: 14px; }
.recibo-row:last-of-type { border-bottom: none; }
.recibo-row .r-label { color: var(--muted); font-size: 12px; }
.recibo-row .r-val { font-weight: 600; color: var(--ink); text-align: right; }
.recibo-total { background: var(--warm); border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
.recibo-total .t-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.recibo-total .t-amount { font-family: Georgia, serif; font-size: 26px; font-weight: 600; color: var(--green); }
.recibo-pago { text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.recibo-fecha { text-align: center; font-size: 10px; color: var(--muted); margin-bottom: 16px; }
.recibo-gracias { text-align: center; font-family: Georgia, serif; font-size: 13px; font-style: italic; color: var(--muted); padding: 12px 0; border-top: 1px dashed var(--warm2); margin-bottom: 16px; }
.recibo-actions { display: flex; gap: 10px; padding: 0 20px 20px; }
.btn-recibo { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-recibo.share { background: var(--ink); color: var(--gold); }
.btn-recibo.close { background: var(--warm); color: var(--muted); border: 1.5px solid var(--warm2); }
.btn-recibo:active { transform: scale(0.96); }

.tabs { display: flex; gap: 0; margin-bottom: 16px; background: var(--warm2); border-radius: 12px; padding: 3px; }
.tab-btn { flex: 1; padding: 9px; border-radius: 10px; border: none; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.2s; }
.tab-btn.active { background: var(--white); color: var(--ink); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

.p-4 { padding: 16px; }
</style>
</head>
<body>

<!-- Pantalla de carga -->
<div id="loading-screen">
  <div class="brand-name">Lovely</div>
  <div class="brand-sub">Pijamas · Studio</div>
  <div class="spinner"></div>
</div>

<header>
  <div class="brand">
    <div class="brand-name">Lovely</div>
    <div class="brand-sub">Pijamas · Studio</div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="descargarExcel()" title="Exportar Excel" style="position:relative">
      <i class="fas fa-file-excel"></i>
      <span class="sync-dot"></span>
    </button>
  </div>
</header>

<main id="app" class="p-4"></main>

<nav class="nav-bottom">
  <button class="nav-link active" id="btn-stock" onclick="irA('stock')"><i class="fas fa-layer-group"></i>Stock</button>
  <button class="nav-link" id="btn-nuevo" onclick="irA('nuevo')"><i class="fas fa-plus-circle"></i>Nuevo</button>
  <button class="nav-link" id="btn-historial" onclick="irA('historial')"><i class="fas fa-clock-rotate-left"></i>Historial</button>
  <button class="nav-link" id="btn-balance" onclick="irA('balance')"><i class="fas fa-chart-pie"></i>Balance</button>
</nav>

<!-- Modal venta / entrada -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Registrar Venta</div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm" id="modal-confirm" onclick="confirmarModal()">Confirmar</button>
    </div>
  </div>
</div>

<!-- Modal recibo -->
<div class="recibo-overlay hidden" id="recibo">
  <div class
