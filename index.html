<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lovely Pijamas · Studio</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --gold: #c9a84c; --gold-dark: #8a6520; --ink: #1a1714; --warm: #f7f4ef; --warm2: #efe9de;
  --muted: #9b8f80; --white: #ffffff; --green: #27ae60;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: var(--warm); color: var(--ink); padding-bottom: 90px; }

/* PANTALLA CARGA */
#loading-screen { position: fixed; inset: 0; background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.5s; }
.brand-name { font-family: Georgia, serif; font-size: 28px; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
.spinner { width: 30px; height: 30px; border: 3px solid rgba(201,168,76,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 15px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* HEADER */
header { background: var(--ink); padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 200; }
.brand-sub { font-size: 8px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
.sync-dot { width: 10px; height: 10px; background: #444; border-radius: 50%; border: 2px solid #000; transition: 0.3s; }

/* NAVEGACIÓN */
.nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); display: flex; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.1); }
.nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.3); font-size: 10px; background: none; border: none; gap: 5px; }
.nav-link.active { color: var(--gold); }

/* UI */
.card { background: #fff; border-radius: 20px; padding: 20px; border: 1px solid var(--warm2); margin: 15px; }
.input { width: 100%; border: 1.5px solid var(--warm2); border-radius: 12px; padding: 14px; margin-bottom: 12px; background: var(--warm); font-size: 16px; }
.btn-gold { width: 100%; background: var(--ink); color: var(--gold); border: none; border-radius: 14px; padding: 16px; font-weight: 600; text-transform: uppercase; cursor: pointer; }

.prod-card { background: #fff; border-radius: 18px; padding: 16px; border: 1px solid var(--warm2); margin-bottom: 12px; }
.tallas-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
.talla-btn { background: var(--warm); border: 1.5px solid var(--warm2); border-radius: 12px; padding: 12px 5px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://lovelypijamas-97662-default-rtdb.firebaseio.com/", 
    projectId: "lovelypijamas-97662"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const stockRef = ref(db, 'inventario/');

  onValue(stockRef, (snapshot) => {
    window.productos = snapshot.val() || [];
    if(window.renderStock) window.renderStock();
    document.querySelector('.sync-dot').style.background = '#27ae60';
  });

  window.guardarEnNube = (data) => set(stockRef, data);
</script>

</head>
<body>

<div id="loading-screen"><div class="brand-name">Lovely</div><div class="spinner"></div></div>

<header>
  <div><div class="brand-name" style="font-size:18px">Lovely</div><div class="brand-sub">Pijamas Studio</div></div>
  <div class="sync-dot"></div>
</header>

<main id="app"></main>

<nav class="nav-bottom">
  <button class="nav-link active" id="btn-stock" onclick="irA('stock')"><i class="fas fa-layer-group"></i>Stock</button>
  <button class="nav-link" id="btn-nuevo" onclick="irA('nuevo')"><i class="fas fa-plus-circle"></i>Nuevo</button>
</nav>

<script>
window.productos = [];

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

function irA(vista) {
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.getElementById('btn-' + vista).classList.add('active');
  if(vista === 'stock') renderStock();
  if(vista === 'nuevo') renderNuevo();
}

window.renderStock = function() {
  const app = document.getElementById('app');
  if(window.productos.length === 0) {
    app.innerHTML = '<div style="text-align:center; padding:100px 20px; color:var(--muted)">Inventario vacío. Agrega una pijama en "Nuevo".</div>';
    return;
  }
  let html = '';
  window.productos.forEach((p, i) => {
    html += `<div class="prod-card" style="margin:15px">
      <div style="display:flex; justify-content:space-between; font-weight:600">
        <span>${p.nombre}</span><span style="color:var(--gold-dark)">$${p.precio}</span>
      </div>
      <div class="tallas-grid">
        ${['S','M','L','XL'].map(t => `
          <button class="talla-btn" onclick="vender(${i}, '${t}')">
            <span style="font-size:10px; color:var(--muted)">${t}</span>
            <span style="font-size:18px; font-weight:700">${p.tallas[t] || 0}</span>
          </button>
        `).join('')}
      </div>
      <button onclick="eliminar(${i})" style="margin-top:12px; background:none; border:none; color:var(--muted); font-size:10px; text-decoration:underline">ELIMINAR REFERENCIA</button>
    </div>`;
  });
  app.innerHTML = html;
}

function renderNuevo() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h3 style="margin-bottom:15px">Nueva Pijama</h3>
      <input type="text" id="n-nom" class="input" placeholder="Nombre (Ej: Pijama Seda)">
      <input type="number" id="n-pre" class="input" placeholder="Precio $">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <input type="number" id="n-s" class="input" placeholder="Cant. S">
        <input type="number" id="n-m" class="input" placeholder="Cant. M">
        <input type="number" id="n-l" class="input" placeholder="Cant. L">
        <input type="number" id="n-xl" class="input" placeholder="Cant. XL">
      </div>
      <button class="btn-gold" onclick="crear()">Guardar en la Nube</button>
    </div>`;
}

window.crear = function() {
  const p = {
    nombre: document.getElementById('n-nom').value,
    precio: document.getElementById('n-pre').value,
    tallas: {
      S: parseInt(document.getElementById('n-s').value || 0),
      M: parseInt(document.getElementById('n-m').value || 0),
      L: parseInt(document.getElementById('n-l').value || 0),
      XL: parseInt(document.getElementById('n-xl').value || 0)
    }
  };
  window.productos.push(p);
  window.guardarEnNube(window.productos);
  irA('stock');
}

window.vender = function(idx, talla) {
  if(window.productos[idx].tallas[talla] > 0) {
    window.productos[idx].tallas[talla]--;
    window.guardarEnNube(window.productos);
  }
}

window.eliminar = function(idx) {
  if(confirm("¿Eliminar este producto de todos los dispositivos?")) {
    window.productos.splice(idx, 1);
    window.guardarEnNube(window.productos);
  }
}

window.onload = () => {
  setTimeout(() => {
    document.getElementById('loading-screen').style.opacity = '0';
    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
    irA('stock');
  }, 1000);
};
</script>
</body>
</html>
